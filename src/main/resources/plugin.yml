name: OAuth_gift_example
version: 1.0-SNAPSHOT
main: org.oauth_gift_example.GiftPlugin
api-version: '1.20'
depend: [OAuthLink]
author: XiaoQ

commands:
  oauthgift:
    description: 管理礼物发放记录
    usage: /oauthgift <reset|status> [玩家名]
    permission: oauth_gift.admin
    aliases: []

permissions:
  oauth_gift.admin:
    description: 允许使用 /oauthgift 管理命令
    default: op
